server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://192.168.1.42:3306/auth_service
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:abcd}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 25

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyThatIsAtLeast256BitsForHS256AlgorithmSecurity!!}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  issuer: ${JWT_ISSUER:auth-service}

# Bootstrap admin user — created automatically on first startup
# Override via environment variables in production
admin:
  email: ${ADMIN_EMAIL:admin@authservice.com}
  password: ${ADMIN_PASSWORD:Admin@2026}
  first-name: ${ADMIN_FIRST_NAME:Admin}
  last-name: ${ADMIN_LAST_NAME:User}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

logging:
  level:
    com.authservice: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{userId:-anonymous}] [%X{traceId:-none}] %logger{36} - %msg%n"

